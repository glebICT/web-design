<!DOCTYPE html>
<html>
<head>
  <title>Python WebSocket Pong</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
    }
    canvas {
      display: block;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 14px;
    }
    #server-ip {
      position: absolute;
      top: 10px;
      right: 10px;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="900" height="600"></canvas>
  <div id="info">Connect to ws://YOUR_SERVER_IP:8765</div>
  <div id="server-ip">
    <input id="serverInput" type="text" placeholder="192.168.1.100:8765" style="width: 150px; padding: 5px;">
    <button onclick="connect()">Connect</button>
  </div>

  <script>
    const emojis = [
      'рЯФі','рЯЯ†','рЯЯ°','рЯЯҐ','рЯФµ','рЯЯ£','рЯЯ§','вЪЂ','вЪ™','рЯФШ',
      'рЯМС','рЯМТ','рЯМУ','рЯМФ','рЯМХ','рЯМЦ','рЯМЧ','рЯМШ','в≠Р','вЬ®',
      'рЯТО','рЯФЈ','рЯФЄ','рЯФє','рЯФЇ','рЯФї','рЯТ†','рЯФґ','рЯОѓ','рЯО™',
      'рЯО®','рЯОђ','рЯО§','рЯОІ','рЯОЉ','рЯОµ','рЯОґ','рЯОє','рЯФ•','рЯТІ',
      'рЯМК','вЪ°','рЯМ™пЄП','рЯТ®','рЯМИ','вШАпЄП','рЯМ§пЄП','вЫЕ','рЯМЩ','рЯМЯ'
    ];

    // Pre-computed emoji map: IP string -> emoji
    const ipToEmojiMap = new Map();

    function ipToSingleEmoji(ip) {
      if (ipToEmojiMap.has(ip)) {
        return ipToEmojiMap.get(ip);
      }
      
      const octets = ip.split('.').map(Number);
      const hash = (octets[0] * 1000 + octets[1] * 100 + octets[2] * 10 + octets[3]) % 64;
      const emoji = emojis[hash];
      
      ipToEmojiMap.set(ip, emoji);
      return emoji;
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');
    const serverInput = document.getElementById('serverInput');

    let ws = null;
    let myY = 250;
    const keys = {};
    let lastSent = 0;
    let connected = false;

    // Input handling
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    function connect() {
      const server = serverInput.value || 'localhost:8765';
      if (ws) ws.close();

      info.textContent = `Connecting to ws://${server}...`;
      ws = new WebSocket(`ws://${server}`);

      ws.onopen = () => {
        info.textContent = 'Connected! вЖСвЖУ or WASD to move';
        connected = true;
        update();
      };

      ws.onmessage = (event) => {
        const state = JSON.parse(event.data);

        ctx.clearRect(0, 0, 800, 600);

        // Draw ball
        ctx.fillStyle = '#fff';
        ctx.fillRect(state.ball.x - 5, state.ball.y - 5, 10, 10);

        // Draw center line
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(400, 0);
        ctx.lineTo(400, 600);
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw players
        Object.entries(state.players).forEach(([id, player], index) => {
          const x = index === 0 ? 10 : 780;  // Left/Right paddle
          ctx.fillStyle = '#0f0';
          ctx.fillRect(x, player.y - 25, 10, 50);

          // Player info - now cached!
          ctx.fillStyle = '#fff';
          ctx.font = '12px Arial';
          const emoji = ipToSingleEmoji(player.ip);
          ctx.fillText(`${emoji}`, x - 3, player.y);
          ctx.fillText(`Score: ${player.score}`, x + 15, 30);
        });
      };

      ws.onerror = () => {
        info.textContent = 'Connection failed! Check IP/port/firewall';
      };

      ws.onclose = () => {
        info.textContent = 'Disconnected. Click Connect to retry';
        connected = false;
      };
    }

    function update() {
      if (!connected) {
        requestAnimationFrame(update);
        return;
      }

      // Movement
      if (keys['ArrowUp'] || keys['w'] || keys['W']) myY = Math.max(0, myY - 6);
      if (keys['ArrowDown'] || keys['s'] || keys['S']) myY = Math.min(550, myY + 6);

      // Rate limited send (20fps max)
      const now = Date.now();
      if (now - lastSent > 50) {
        ws.send(JSON.stringify({ y: myY }));
        lastSent = now;
      }

      requestAnimationFrame(update);
    }

    // Auto-connect on Enter
    serverInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') connect();
    });

    // Try localhost first
    serverInput.value = 'localhost:8765';
  </script>
</body>
</html>
